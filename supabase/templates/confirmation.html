<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirme seu e-mail — Toq Tennis</title>
  </head>
  <body style="margin:0;padding:0;background:#f1f5f9;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e2e8f0;">
            <tr>
              <td style="background:#051024;padding:24px 32px;text-align:center;">
                <img
                  src="https://toqserver.vercel.app/imagens_publicas/logo_sidebar.png"
                  alt="Toq"
                  width="140"
                  height="48"
                  style="display:block;margin:0 auto;border:0;outline:none;text-decoration:none;height:auto;max-width:140px;"
                />
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;color:#051024;">Bem-vindo à Toq</h1>
                <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#334155;">
                  Confirme o e-mail <strong style="color:#051024;">{{ .Email }}</strong> para ativar sua conta.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 auto 28px;">
                  <tr>
                    <td style="border-radius:10px;background:#2563eb;">
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;"
                      >
                        Confirmar e-mail
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:13px;line-height:1.5;color:#64748b;">
                  Se você não criou uma conta na Toq Tennis, ignore este e-mail.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;text-align:center;">
                <p style="margin:0;font-size:12px;color:#94a3b8;">
                  Toq Tennis · <a href="{{ .SiteURL }}" style="color:#2563eb;text-decoration:none;">toqtennis.com.br</a>
                </p>
                <p style="margin:8px 0 0;font-size:11px;color:#94a3b8;">
                  Dúvidas?
                  <a href="mailto:servertoq@gmail.com" style="color:#2563eb;text-decoration:none;">servertoq@gmail.com</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
